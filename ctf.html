<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ctf@kali: ~/CTF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0b0e14;
    --bg-header: #14171f;
    --border: #262a35;
    --text: #d7dbe0;
    --dim: #6b7280;
    --blue: #4fa8ff;
    --cyan: #4ad9d9;
    --green: #5fd97a;
    --yellow: #e0c25e;
    --red: #ff6b6b;
    --magenta: #d17bff;
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    min-height:100vh;
    background: radial-gradient(ellipse at 50% -10%, #1a2030 0%, #05070a 65%);
    display:flex; align-items:center; justify-content:center;
    padding: 26px 12px;
    font-family: 'JetBrains Mono', Consolas, Monaco, 'Courier New', monospace;
  }

  .term{
    width: 760px;
    max-width: 96vw;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.02);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    transition: width .18s ease;
  }
  .term.maxed{ width: 96vw; }

  .term-header{
    background: var(--bg-header);
    border-bottom: 1px solid var(--border);
    padding: 9px 12px;
    display:flex; align-items:center;
    gap:10px;
  }
  .term-title{
    flex:1;
    text-align:center;
    color: var(--dim);
    font-size: 12.5px;
    letter-spacing:.2px;
    user-select:none;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .win-controls{ display:flex; gap:7px; }
  .win-controls .dot{
    width:12px; height:12px; border-radius:50%;
    border: none; cursor:pointer; padding:0;
  }
  .dot.min{ background:#e5b842; }
  .dot.max{ background:#3fb950; }
  .dot.close{ background:#ff5f56; }
  .dot:focus-visible{ outline: 1px solid #fff; outline-offset:2px; }
  .header-spacer{ width:54px; flex:none; }

  .term-body{
    padding: 14px 16px 10px;
    height: 440px;
    overflow-y:auto;
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text);
    scrollbar-width: thin;
    scrollbar-color: #333844 transparent;
    cursor: text;
  }
  .term-body::-webkit-scrollbar{ width:9px; }
  .term-body::-webkit-scrollbar-thumb{ background:#2b303c; border-radius:5px; }

  .line{ white-space:pre-wrap; word-break: break-word; }
  .row{ display:flex; flex-wrap:wrap; }
  .out{ margin: 0 0 2px 0; }

  .p-brk{ color: var(--blue); }
  .p-user{ color: var(--green); font-weight:600; }
  .p-at{ color: var(--dim); }
  .p-host{ color: var(--cyan); font-weight:600; }
  .p-path{ color: var(--blue); font-weight:600; }
  .p-dollar{ color: var(--green); font-weight:700; }

  .dir-name{ color: var(--blue); font-weight:600; }
  .file-name{ color: var(--text); }
  .hidden-name{ color: var(--yellow); }
  .err{ color: var(--red); }
  .info{ color: var(--dim); }
  .flagtext{ color: var(--magenta); font-weight:700; }

  .grid-ls{ display:flex; flex-wrap:wrap; gap: 4px 22px; margin: 2px 0 6px; }

  .promptline{ display:flex; align-items:center; gap:6px; }
  .cmd-input{
    flex:1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font: inherit;
    caret-color: var(--green);
    min-width: 60px;
  }

  @media (max-width: 560px){
    .term-body{ height: 380px; font-size: 12.5px; }
  }
</style>
</head>
<body>

  <div class="term" id="term">
    <div class="term-header">
      <div class="win-controls">
        <button class="dot min" id="btnMin" title="Riduci" aria-label="Riduci"></button>
        <button class="dot max" id="btnMax" title="Ingrandisci" aria-label="Ingrandisci"></button>
        <button class="dot close" id="btnClose" title="Chiudi" aria-label="Chiudi"></button>
      </div>
      <div class="term-title" id="termTitle">ctf@kali: ~</div>
      <div class="header-spacer"></div>
    </div>
    <div class="term-body" id="termBody" tabindex="-1"></div>
  </div>

<script>
(function(){
  const USER = 'ctf';
  const HOST = 'kali';

  // ---------- virtual filesystem ----------
  // Dates & Dimensions
  const comps = [
    { name: "HTB - CTF Try Out",             size: 2140, date: "Jan 12  2025" },
    { name: "HTB - CyberApocalypse_2025",    size: 6420, date: "Mar 24  2025" },
    { name: "SnykCon2025",                   size: 1870, date: "Apr 02  2025" },
    { name: "SwampCTF_2025",                 size: 3310, date: "Apr 19  2025" },
    { name: "THM - Industrial Intrusion",    size: 2765, date: "May 14  2025" },
    { name: "squ1rrel_2025",                 size: 1590, date: "May 30  2025" },
    { name: "L3akCTF 2025",                  size: 4120, date: "Jun 21  2025" },
    { name: "ENOWARS 9",                     size: 7830, date: "Jun 28  2025" },
    { name: "UIUCTF 2025",                   size: 5290, date: "Jul 11  2025" },
    { name: "WHY2025",                       size: 2010, date: "Aug 08  2025" },
    { name: "ScriptCTF 2025",                size: 1980, date: "Aug 23  2025" },
    { name: "SnakeCTF 2025 Quals",           size: 2440, date: "Sep 13  2025" },
    { name: "Infobahn CTF'25",               size: 3005, date: "Oct 05  2025" }
  ];

  let inodeSeq = 130001;
  function nextInode(){ return inodeSeq++; }

  function mkDir(name, date, children){
    return { name, type:'dir', date, inode: nextInode(), children: children || [] };
  }
  function mkFile(name, size, date, opts){
    opts = opts || {};
    return { name, type:'file', size, date, inode: nextInode(), hidden: !!opts.hidden, content: opts.content || null };
  }

  const y2025 = mkDir('2025', 'Oct 05  2025', comps.map(c => mkFile(c.name, c.size, c.date)));
  const y2026 = mkDir('2026', 'Jan 01  2026', []);
  const ctf = mkDir('CTF', 'Oct 05  2025', [y2025, y2026]);
  const flag = mkFile('.flag', 41, 'Jan 01  2025', { hidden:true, content: "CTF{grazie_per_aver_curiosato_nel_mio_sito}" });
  const home = mkDir('~', 'Oct 05  2025', [ctf, flag]);
  home.parent = null;
  (function link(node){ (node.children||[]).forEach(c => { c.parent = node; link(c); }); })(home);

  function linksFor(node){
    if(node.type === 'file') return 1;
    const subdirs = node.children.filter(c => c.type === 'dir').length;
    return 2 + subdirs;
  }

  // ---------- state ----------
  let cwd = y2025; // start inside ~/CTF/2025 so the list is visible right away
  const history = [];
  let historyPtr = 0;

  const body = document.getElementById('termBody');
  const termTitle = document.getElementById('termTitle');

  function pathStr(node){
    if(node === home) return '~';
    const parts = [];
    let n = node;
    while(n && n !== home){ parts.unshift(n.name); n = n.parent; }
    return '~/' + parts.join('/');
  }

  function el(tag, cls, html){
    const e = document.createElement(tag);
    if(cls) e.className = cls;
    if(html !== undefined) e.innerHTML = html;
    return e;
  }

  function appendOut(html){
    const d = el('div', 'line out', html);
    body.appendChild(d);
  }

  function scrollBottom(){ body.scrollTop = body.scrollHeight; }

  function promptHTML(pathText){
    return '<span class="p-brk">┌──(</span><span class="p-user">' + USER + '</span>' +
      '<span class="p-at">㉿</span><span class="p-host">' + HOST + '</span>' +
      '<span class="p-brk">)-[</span><span class="p-path">' + pathText + '</span><span class="p-brk">]</span>';
  }

  function renderStaticPromptLines(pathText, cmdText){
    appendOut(promptHTML(pathText));
    appendOut('<span class="p-brk">└─</span><span class="p-dollar">$</span> ' + escapeHTML(cmdText));
  }

  function escapeHTML(s){
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ---------- path resolution ----------
  function resolve(pathArg, base){
    base = base || cwd;
    if(!pathArg || pathArg === '.') return base;
    let start = base;
    let segments;
    if(pathArg.startsWith('~') ){
      start = home;
      segments = pathArg.slice(1).split('/').filter(Boolean);
    } else if(pathArg.startsWith('/')){
      start = home;
      segments = pathArg.split('/').filter(Boolean);
    } else {
      segments = pathArg.split('/').filter(Boolean);
    }
    let node = start;
    for(const seg of segments){
      if(seg === '.') continue;
      if(seg === '..'){ node = node.parent || node; continue; }
      if(node.type !== 'dir') return null;
      let match = node.children.find(c => c.name === seg);
      if(!match) match = node.children.find(c => c.name.toLowerCase() === seg.toLowerCase());
      if(!match) return null;
      node = match;
    }
    return node;
  }

  // ---------- commands ----------
  function cmdPwd(){
    appendOut(pathStr(cwd).replace('~', '/home/' + USER));
  }

  function cmdLs(args){
    const flags = args.filter(a => a.startsWith('-')).join('');
    const showAll = flags.includes('a');
    const longFmt = flags.includes('l');
    const showInode = flags.includes('i');
    const pathArgs = args.filter(a => !a.startsWith('-'));

    let target = cwd;
    if(pathArgs.length){
      const r = resolve(pathArgs[0]);
      if(!r){ appendOut('<span class="err">ls: impossibile accedere a \'' + escapeHTML(pathArgs[0]) + '\': File o directory non esistente</span>'); return; }
      target = r;
    }

    if(target.type === 'file'){
      appendOut(target.hidden ? ('<span class="hidden-name">' + target.name + '</span>') : target.name);
      return;
    }

    let items = target.children.slice();
    if(!showAll) items = items.filter(c => !c.hidden);
    items.sort((a,b) => a.name.localeCompare(b.name));

    const dots = [];
    if(showAll){
      dots.push({ name:'.', type:'dir', inode: target.inode, date: target.date, dotRef: target });
      dots.push({ name:'..', type:'dir', inode: (target.parent||target).inode, date: (target.parent||target).date, dotRef: target.parent||target });
    }
    const rows = dots.concat(items);

    if(rows.length === 0) return;

    if(longFmt){
      const fmt = rows.map(r => {
        const isDir = r.type === 'dir';
        const perm = isDir ? 'drwxr-xr-x' : (r.hidden ? '-rw-------' : '-rw-r--r--');
        const links = String(r.dotRef ? linksFor(r.dotRef) : linksFor(r));
        const size = String(isDir ? 4096 : r.size);
        const inode = String(r.inode);
        const [mon, day, rest] = r.date.split(/\s+/);
        return { inode, perm, links, owner: USER, group: USER, size, date: mon + ' ' + day + ' ' + rest, name: r.name, isDir, hidden: !!r.hidden };
      });
      const w = {
        inode: Math.max(...fmt.map(r => r.inode.length)),
        links: Math.max(...fmt.map(r => r.links.length)),
        size:  Math.max(...fmt.map(r => r.size.length))
      };
      fmt.forEach(r => {
        const nameHTML = r.isDir ? ('<span class="dir-name">' + r.name + '</span>') : (r.hidden ? ('<span class="hidden-name">' + r.name + '</span>') : ('<span class="file-name">' + r.name + '</span>'));
        let lineTxt = '';
        if(showInode) lineTxt += r.inode.padStart(w.inode, ' ') + ' ';
        lineTxt += r.perm + ' ' + r.links.padStart(w.links,' ') + ' ' + r.owner + ' ' + r.group + ' ' + r.size.padStart(w.size,' ') + ' ' + r.date + ' ';
        appendOut(escapeHTML(lineTxt) + nameHTML);
      });
    } else {
      const gridEl = el('div', 'grid-ls');
      rows.forEach(r => {
        const item = el('span', null, r.type === 'dir' ? ('<span class="dir-name">'+r.name+'</span>') : (r.hidden ? ('<span class="hidden-name">'+r.name+'</span>') : ('<span class="file-name">'+r.name+'</span>')));
        gridEl.appendChild(item);
      });
      body.appendChild(gridEl);
    }
  }

  function cmdCd(args){
    if(!args.length || args[0] === '~'){ cwd = home; return; }
    const target = resolve(args[0]);
    if(!target){ appendOut('<span class="err">bash: cd: ' + escapeHTML(args[0]) + ': Nessun file o directory di questo tipo</span>'); return; }
    if(target.type !== 'dir'){ appendOut('<span class="err">bash: cd: ' + escapeHTML(args[0]) + ': Directory non valida</span>'); return; }
    cwd = target;
  }

  function cmdCat(args){
    if(!args.length){ appendOut('<span class="err">uso: cat &lt;file&gt;</span>'); return; }
    const target = resolve(args[0]);
    if(!target){ appendOut('<span class="err">cat: ' + escapeHTML(args[0]) + ': File o directory non esistente</span>'); return; }
    if(target.type === 'dir'){ appendOut('<span class="err">cat: ' + escapeHTML(args[0]) + ': È una directory</span>'); return; }
    if(target.content){
      appendOut('<span class="flagtext">' + escapeHTML(target.content) + '</span>');
    } else {
      appendOut('<span class="info"># ' + escapeHTML(target.name) + '\nWriteup non ancora pubblicato — presto qui i dettagli della competizione.</span>');
    }
  }

  function cmdWhoami(){ appendOut(USER); }

  function cmdNeofetch(){
    const info = [
      ['ctf@kali'],
      ['-----------'],
      ['OS', 'Kali GNU/Linux (portfolio edition)'],
      ['Shell', 'zsh 5.9'],
      ['Terminal', 'ctf-explorer-cli'],
      ['CTF completate', String(comps.length)],
      ['Cartella', pathStr(cwd)]
    ];
    info.forEach(row => {
      if(row.length === 1){ appendOut('<span class="p-host">' + row[0] + '</span>'); return; }
      appendOut('<span class="p-path">' + row[0] + '</span>: ' + escapeHTML(row[1]));
    });
  }

  function cmdHelp(){
    const rows = [
      ['ls [-l -i -a]', 'elenca il contenuto della cartella'],
      ['cd <cartella>', 'cambia cartella (.. per risalire, ~ per la home)'],
      ['pwd', 'mostra il percorso corrente'],
      ['cat <file>', 'mostra il contenuto di un file'],
      ['whoami', 'mostra l\'utente corrente'],
      ['neofetch', 'info di sistema'],
      ['clear', 'pulisce il terminale'],
      ['help', 'mostra questo elenco']
    ];
    rows.forEach(r => appendOut('<span class="p-path">' + r[0].padEnd(16,' ') + '</span>' + escapeHTML(r[1])));
  }

  const DISABLED = ['rm','mkdir','touch','mv','cp','chmod','rmdir'];

  function runCommand(raw){
    const trimmed = raw.trim();
    renderStaticPromptLines(pathStr(cwd).replace('~', '~'), raw);
    if(!trimmed){ return; }

    const tokens = trimmed.split(/\s+/);
    const cmd = tokens[0];
    const args = tokens.slice(1);

    if(cmd === 'clear'){ body.innerHTML = ''; return; }
    if(cmd === 'ls'){ cmdLs(args); return; }
    if(cmd === 'cd'){ cmdCd(args); return; }
    if(cmd === 'pwd'){ cmdPwd(); return; }
    if(cmd === 'cat'){ cmdCat(args); return; }
    if(cmd === 'whoami'){ cmdWhoami(); return; }
    if(cmd === 'neofetch'){ cmdNeofetch(); return; }
    if(cmd === 'help' || cmd === '--help'){ cmdHelp(); return; }
    if(cmd === 'echo'){ appendOut(escapeHTML(args.join(' '))); return; }
    if(cmd === 'exit' || cmd === 'logout'){ appendOut('<span class="info">Non così in fretta — questa shell resta aperta, è il mio sito ;)</span>'); return; }
    if(cmd === 'sudo'){ appendOut('<span class="err">' + USER + ' non è presente nel file sudoers. Questo incidente verrà segnalato.</span>'); return; }
    if(DISABLED.includes(cmd)){ appendOut('<span class="err">Permesso negato: comando disattivato in questa demo.</span>'); return; }

    appendOut('<span class="err">bash: ' + escapeHTML(cmd) + ': comando non trovato</span>');
  }

  // ---------- live prompt / input ----------
  let liveWrap = null, liveInput = null;

  function spawnPrompt(){
    liveWrap = el('div', 'line');
    liveWrap.innerHTML = promptHTML(pathStr(cwd));
    body.appendChild(liveWrap);

    const row = el('div', 'promptline');
    row.innerHTML = '<span class="p-brk">└─</span><span class="p-dollar">$</span>';
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'cmd-input';
    input.autocomplete = 'off';
    input.autocapitalize = 'off';
    input.spellcheck = false;
    row.appendChild(input);
    body.appendChild(row);
    liveInput = input;

    input.addEventListener('keydown', onKeyDown);
    input.focus();
    termTitle.textContent = USER + '@' + HOST + ': ' + pathStr(cwd);
    scrollBottom();
  }

  function onKeyDown(e){
    if(e.key === 'Enter'){
      const val = liveInput.value;
      const rowToRemove = liveInput.parentElement;
      liveWrap.remove();
      rowToRemove.remove();
      if(val.trim()){ history.push(val); historyPtr = history.length; }
      runCommand(val);
      spawnPrompt();
      scrollBottom();
      return;
    }
    if(e.key === 'ArrowUp'){
      e.preventDefault();
      if(historyPtr > 0){ historyPtr--; liveInput.value = history[historyPtr] || ''; }
      return;
    }
    if(e.key === 'ArrowDown'){
      e.preventDefault();
      if(historyPtr < history.length){ historyPtr++; liveInput.value = history[historyPtr] || ''; }
      return;
    }
    if(e.key === 'Tab'){
      e.preventDefault();
      const val = liveInput.value;
      const parts = val.split(' ');
      const partial = parts[parts.length - 1];
      let pool;
      if(parts.length <= 1){
        pool = ['ls','cd','pwd','cat','whoami','neofetch','clear','help'];
      } else {
        pool = (cwd.children || []).filter(c => !c.hidden).map(c => c.name);
      }
      const matches = pool.filter(p => p.toLowerCase().startsWith(partial.toLowerCase()));
      if(matches.length === 1){
        parts[parts.length - 1] = matches[0];
        liveInput.value = parts.join(' ');
      } else if(matches.length > 1){
        appendOut('<span class="info">' + matches.join('   ') + '</span>');
      }
      return;
    }
  }

  // ---------- boot sequence ----------
  function typeLine(text, cls, cb){
    const d = el('div', 'line ' + (cls||''));
    body.appendChild(d);
    let i = 0;
    (function step(){
      d.textContent = text.slice(0, i);
      i++;
      scrollBottom();
      if(i <= text.length){ setTimeout(step, 12); } else if(cb){ cb(); }
    })();
  }

  function boot(){
    typeLine('Ultimo accesso: oggi da 127.0.0.1', 'info', () => {
      setTimeout(() => {
        renderStaticPromptLines('~', 'cd CTF/2025 && ls -li');
        cmdLs(['-l','-i']);
        scrollBottom();
        spawnPrompt();
      }, 250);
    });
  }

  document.getElementById('termBody').addEventListener('click', () => { liveInput && liveInput.focus(); });

  const termEl = document.getElementById('term');
  const bodyEl = document.getElementById('termBody');
  document.getElementById('btnMin').addEventListener('click', () => {
    bodyEl.style.display = bodyEl.style.display === 'none' ? '' : 'none';
  });
  document.getElementById('btnMax').addEventListener('click', () => termEl.classList.toggle('maxed'));
  document.getElementById('btnClose').addEventListener('click', () => {
    appendOut('<span class="info"># provaci pure, ma questa finestra non si chiude davvero.</span>');
    liveInput && liveInput.focus();
    scrollBottom();
  });

  boot();
})();
</script>
</body>
</html>
